interface:
  display_name: "KIT Skills"
  short_description: "Product-language KIT framework for brainstorm, project facts, routing, and validation."
  default_prompt: "Use kit-skills when the user needs brainstorm/产品构思, 建档, 归档, .plan/.kit governance, PRD/SPEC/CHECKLIST, profile audit, or product-language-to-development translation. If .plan/ or .kit/ already exists, start every KIT invocation with a compact status brief: current state, endpoint, direction drift, next safe action, and real user decision if any. Use knowledge/question-bank.json question IDs for repeated prompts instead of long boilerplate. Before recommending a framework, classify what the user is building: skill, stable workflow, CLI harness, frontend/backend app, OMC orchestration, OpenCLI automation, SDK integration, pure MD framework, or design prototype. Ask at most 1-2 sharp questions when unclear, then explain default path, alternatives, reversibility, and no-return decisions. Before archive/cleanup/file movement, ask only if PRD/SPEC/CHECKLIST/.kit/.workflow/.test/live files are not aligned or the move may affect current entry, recovery state, user test package, live-action evidence, secrets, or hardcoded environment settings. For frontend/backend stack selection, consider OpenSpec for spec-driven change management and Super Dev for governed delivery; for skill/workflow/design, prefer skill package or stable workflow first before CLI/WebUI. Detect host before creating entries: Claude uses CLAUDE.md, others use AGENTS.md. Keep KIT Core focused on product facts, architecture choices, stop gates, drift detection, and evidence contracts. Use .workflow/ as the single workflow entry. Keep testing under .test/: AI self-checks and simulated users in .test/ai/, real user packages and feedback in .test/user/. Do not create root output/ or outputs/. During archive cleanup, check hardcoded assumptions: local paths, browser profiles, account/platform IDs, fixed ports, temp/download/output paths, floating model aliases, placeholders, and secret-like literals. For model/agent/SDK projects, record Model / Agent Risk Ledger fields such as provider/model_id, budget/quota/rate limit, context/chunk policy, tool permissions, eval isolation, tracing sensitive data, reproducibility, and evidence retention. Route research, QA, browser automation, publishing, and team execution to the appropriate project tool or skill, then record owner/status/evidence in SPEC/CHECKLIST. Prefer the bundled bin/spec-loop-kit.mjs helper for init, validate, and audit when available. The helper supports --template with three presets: minimal (PRD only), standard (PRD/SPEC/CHECKLIST), full (PRD/SPEC/CHECKLIST plus .workflow/, .kit/, docs/). Use --experiment to enable the multi-round multi-group experiment framework for validated comparison of approaches; rounds are v1/v2/v3, groups are group-a (baseline), group-b, group-c. Enable heartbeat monitoring for background tasks exceeding type-specific thresholds (default/build/training/download presets with configurable interval/timeout and 3-retry failure handling). The --level flag uses 3-tier scale semantics: 0-1=quick (<1 day), 2=standard (2-5 days), 3-4=deep (1+ weeks). Create .cron/ only when the project requires automated, scheduled, or unattended execution. Create tests/, evals/, USER.md, and SOUL.md on-demand: tests/ for framework-standard unit/integration tests, evals/ for AI full-program self-tests, USER.md for recurring user preferences, SOUL.md for non-negotiable project core principles."
